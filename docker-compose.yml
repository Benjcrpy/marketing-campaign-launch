services:
  hermes:
    image: nousresearch/hermes-agent:latest
    platform: linux/amd64
    restart: unless-stopped
    command: gateway
    ports:
      - "8642:8642"
    environment:
      - API_SERVER_ENABLED=true
      - API_SERVER_HOST=0.0.0.0
      - API_SERVER_PORT=8642
      - API_SERVER_KEY=change-me-local-dev
      # Hermes can use OpenRouter as its provider; we forward these.
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - HERMES_INFERENCE_PROVIDER=openrouter
    volumes:
      - ./hermes-data:/opt/data
      # OpenClaw-style workspace (SOUL.md, shared/) — readable by Hermes tools if configured
      - ./hermes-workspace:/opt/data/scenario2:ro

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - WORKDIR=/app
      - HERMES_WORKSPACE_DIR=/app/hermes-workspace
      - HERMES_API_BASE_URL=http://hermes:8642/v1
      - HERMES_API_KEY=change-me-local-dev
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-arcee-ai/trinity-large-preview:free}
    volumes:
      - ./agents:/app/agents:ro
      - ./config:/app/config
      - ./hermes-workspace:/app/hermes-workspace:ro

